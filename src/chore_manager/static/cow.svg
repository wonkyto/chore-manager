<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Solid Hereford-red background -->
  <rect width="180" height="180" rx="36" fill="#A8442A"/>

  <!-- Ears -->
  <ellipse cx="44" cy="78" rx="14" ry="9" transform="rotate(-25 44 78)" fill="#7A2E1C"/>
  <ellipse cx="136" cy="78" rx="14" ry="9" transform="rotate(25 136 78)" fill="#7A2E1C"/>

  <!-- White Hereford face: pill-shaped blaze -->
  <path d="M62,68
           Q62,52 90,52
           Q118,52 118,68
           L118,118
           Q118,138 90,138
           Q62,138 62,118 Z"
        fill="#F5EFE2"/>

  <!-- Eyes: simple solid dots -->
  <circle cx="78" cy="92" r="4.5" fill="#1A0F0A"/>
  <circle cx="102" cy="92" r="4.5" fill="#1A0F0A"/>

  <!-- Muzzle: subtle inset shape -->
  <ellipse cx="90" cy="118" rx="18" ry="11" fill="#E8DCC4"/>

  <!-- Nostrils -->
  <ellipse cx="84" cy="116" rx="2" ry="3" fill="#1A0F0A"/>
  <ellipse cx="96" cy="116" rx="2" ry="3" fill="#1A0F0A"/>
</svg>
